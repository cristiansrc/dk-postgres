services:
  # El motor de la base de datos
  db:
    image: postgres:18 # Cambia a 18 cuando esté disponible oficialmente
    container_name: postgres_cris
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # El administrador visual (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_cris
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: cristiansrc@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 123456
    ports:
      - "9090:80"
    depends_on:
      - db

volumes:
  postgres_data:
