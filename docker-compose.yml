services:
  # El motor de la base de datos
  db:
    image: postgres:17 # Versión estable actual
    container_name: postgres_cris
    restart: "no"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      shared_db_network:
        aliases:
          - postgres

networks:
  shared_db_network:
    external: true

volumes:
  postgres_data:
